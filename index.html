<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Loot RPG</title>

<link rel="stylesheet" href="style.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<div class="top">

<div class="profile">
<img src="https://i.imgur.com/8Km9tLL.png">

<div>
<h2 id="name">Игрок</h2>
<p>⚔ Уровень <span id="lvl">1</span></p>
</div>

</div>

<div class="currencies">
<div>💎 <span id="gems">250</span></div>
<div>🪙 <span id="gold">1000</span></div>
</div>

</div>

<div class="buttons">

<button onclick="fight()">
⚔ В БОЙ
</button>

<button onclick="openChest()">
🎁 КЕЙС
</button>

</div>

<div class="inventory">

<h3>🎒 Лут</h3>

<div id="drops"></div>

</div>

<script src="script.js"></script>

</body>
</html>
