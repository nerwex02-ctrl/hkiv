<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Loot RPG</title>

<link rel="stylesheet"
href="style.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div class="bg"></div>

<div class="top">

<div class="profile">

<img src="https://i.imgur.com/8Km9tLL.png">

<div>

<h2 id="name">Игрок</h2>

<p>
⚔ Уровень:
<span id="lvl">1</span>
</p>

<p>
❤️ HP:
<span id="hp">100</span>
</p>

<p>
✨ XP:
<span id="xp">0</span>/100
</p>

</div>

</div>

<div class="currencies">

<div>
💎 <span id="gems">250</span>
</div>

<div>
🪙 <span id="gold">0</span>
</div>

</div>

</div>

<div class="enemy">

<div class="enemyName">
👹
<span id="enemy">
Слизень
</span>
</div>

<div class="hpbar">

<div class="hpfill"
id="enemyhp"></div>

</div>

</div>

<div class="buttons">

<button onclick="fight()">
⚔ В БОЙ
</button>

<button onclick="openChest()">
🎁 КЕЙС
</button>

</div>

<div class="inventory">

<h3>🎒 Инвентарь</h3>

<div id="drops"></div>

</div>

<script src="script.js"></script>

</body>
</html>
