<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Loot RPG</title>

<link rel="stylesheet"
href="style.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div class="bg"></div>

<div class="top">

<div class="profile">

<img src="https://i.imgur.com/8Km9tLL.png">

<div>

<h1 id="name">
Игрок
</h1>

<p>
⭐ LVL:
<span id="lvl">1</span>
</p>

<p>
✨ XP:
<span id="xp">0</span>/100
</p>

</div>

</div>

<div class="topStats">

<div>
❤️
<span id="hp">
100
</span> /
<span id="maxhp">
100
</span>
</div>

<div>
⚔
<span id="attack">
5
</span>
</div>

<div>
🛡
<span id="armor">
0
</span>
</div>

<div>
🪙
<span id="gold">
0
</span>
</div>

<div>
💎
<span id="gems">
500
</span>
</div>

</div>

</div>

<div class="enemy">

<h2 id="enemyName">
Слизень
</h2>

<div class="hpbar">

<div
class="hpfill"
id="enemyhp">
</div>

</div>

<p id="enemyhptext">
100 / 100
</p>

<button onclick="fight()">
⚔ АТАКОВАТЬ
</button>

</div>

<div class="menuButtons">

<button onclick="openPage('inventoryPage')">
🎒 ИНВЕНТАРЬ
</button>

<button onclick="openPage('characterPage')">
🧍 ПЕРСОНАЖ
</button>

</div>

<div class="menuButtons">

<button onclick="openPage('shopPage')">
🛒 МАГАЗИН
</button>

<button onclick="openPage('bossPage')">
👹 БОССЫ
</button>

</div>

<div id="inventoryPage"
class="page hidden">

<div class="pageTop">

<h2>
🎒 ИНВЕНТАРЬ
</h2>

<button onclick="closePages()">
✖
</button>

</div>

<p>
Слоты:
<span id="slots">
0
</span>/1000
</p>

<div id="drops"></div>

</div>

<div id="characterPage"
class="page hidden">

<div class="pageTop">

<h2>
🧍 ПЕРСОНАЖ
</h2>

<button onclick="closePages()">
✖
</button>

</div>

<div class="equipGrid">

<div class="equip">

⚔ Оружие

<div id="weaponSlot">
Пусто
</div>

</div>

<div class="equip">

🪖 Шлем

<div id="helmetSlot">
Пусто
</div>

</div>

<div class="equip">

🛡 Броня

<div id="chestSlot">
Пусто
</div>

</div>

<div class="equip">

💍 Кольцо

<div id="ringSlot">
Пусто
</div>

</div>

</div>

</div>

<div id="shopPage"
class="page hidden">

<div class="pageTop">

<h2>
🛒 МАГАЗИН
</h2>

<button onclick="closePages()">
✖
</button>

</div>

<button onclick="openChest()">
🎁 Кейс — 25 💎
</button>

<button onclick="openMegaChest()">
👑 Mega Box — 100 💎
</button>

<button onclick="healPlayer()">
❤️ Хил — 100 🪙
</button>

<button onclick="sellAllCommon()">
💰 Продать common
</button>

</div>

<div id="bossPage"
class="page hidden">

<div class="pageTop">

<h2>
👹 БОССЫ
</h2>

<button onclick="closePages()">
✖
</button>

</div>

<button onclick="spawnBoss('dragon')">
🐉 Дракон
</button>

<button onclick="spawnBoss('titan')">
🗿 Титан
</button>

<button onclick="spawnBoss('void')">
🌌 Повелитель Бездны
</button>

</div>

<script src="script.js"></script>

</body>
</html>
